name: pwn-arena

networks:
  arena:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: pwn-arena-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: ${DB_PASSWORD:-arena}
      POSTGRES_DB: arena
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks: [arena]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pwn-arena-redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD:-arena}"
    volumes:
      - redis-data:/data
    networks: [arena]

  platform:
    build: ./platform
    container_name: pwn-arena-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DB_URL=postgres://arena:${DB_PASSWORD:-arena}@postgres:5432/arena
      - REDIS_URL=redis://:${REDIS_PASSWORD:-arena}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-me}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - RUNNER_URL=http://runner:9000
    networks: [arena]

  runner:
    build: ./runner
    container_name: pwn-arena-runner
    restart: unless-stopped
    depends_on: [redis]
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:-arena}@redis:6379/0
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./challenges:/challenges:ro
    networks: [arena]
